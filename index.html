<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courage Never Quits Active Directory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;line-height:1.5}
.container{max-width:1280px;margin:0 auto;padding:0 1rem}
.header{background:#111827;color:white;padding:2rem 1rem}
.header h1{font-size:2.25rem;font-weight:bold;margin-bottom:.5rem}
.header p{color:#d1d5db}
.filters-section{padding:1.5rem 0}
.filters-container{background:white;border-radius:.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:1.5rem;margin-bottom:1.5rem}
.filter-row{display:grid;grid-template-columns:1fr;gap:1rem;margin-bottom:1rem}
@media(min-width:768px){.filter-row{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.filter-row.three-col{grid-template-columns:repeat(3,1fr)}}
.input-wrapper{position:relative}
.input-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#9ca3af;width:20px;height:20px}
input[type="text"],select{width:100%;padding:.5rem 1rem;border:1px solid #d1d5db;border-radius:.375rem;font-size:1rem}
input[type="text"]{padding-left:2.5rem}
input[type="text"]:focus,select:focus{outline:none;border-color:#111827;box-shadow:0 0 0 3px rgba(17,24,39,.1)}
.results-count{margin-top:1rem;font-size:.875rem;color:#4b5563}
.alumni-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;margin-bottom:2rem}
@media(min-width:1024px){.alumni-grid{grid-template-columns:repeat(2,1fr)}}
.profile-card{background:white;border-radius:.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1);overflow:hidden;transition:box-shadow .3s}
.profile-card:hover{box-shadow:0 10px 15px rgba(0,0,0,.1)}
.photo-grid{display:grid}
.photo-grid.two-photos{grid-template-columns:repeat(2,1fr)}
.photo-grid img{width:100%;height:12rem;object-fit:cover}
.profile-content{padding:1.5rem}
.profile-header{margin-bottom:1rem}
.profile-name{font-size:1.5rem;font-weight:bold;color:#111827;margin-bottom:.25rem}
.profile-full-name{font-size:.875rem;color:#6b7280;margin-bottom:.5rem}
.profile-companies{display:flex;gap:1rem;font-size:.875rem;color:#374151;margin-top:.5rem}
.profile-companies span{font-weight:600}
.contact-info{margin-bottom:1rem}
.contact-item{display:flex;align-items:center;gap:.5rem;color:#374151;font-size:.875rem;margin-bottom:.5rem}
.contact-item svg{color:#6b7280;flex-shrink:0}
.contact-item a{color:#2563eb;text-decoration:none}
.contact-item a:hover{text-decoration:underline}
.writeup{margin-bottom:1rem}
.writeup p{color:#374151;line-height:1.625;white-space:pre-line}
.activities{margin-bottom:1rem}
.activities p{color:#374151;line-height:1.625}
.activities .label{font-weight:600}
.affiliations{padding-top:.75rem;border-top:1px solid #e5e7eb}
.affiliations-tags{display:flex;flex-wrap:wrap;gap:.5rem}
.affiliation-tag{padding:.25rem .75rem;background:#f3f4f6;color:#374151;font-size:.875rem;border-radius:9999px}
.no-results{text-align:center;padding:3rem 0;display:none}
.no-results.show{display:block}
.no-results p{color:#6b7280;font-size:1.125rem}
</style>
</head>
<body>
<div id="app">
<div class="header"><div class="container"><h1>Courage Never Quits Active Directory</h1><p>Reconnect with Classmates the easy way!</p></div></div>
<div class="container filters-section">
<div class="filters-container">
<div class="filter-row three-col">
<select id="gradCoFilter"><option value="">All Grad Companies</option></select>
<select id="plebeCoFilter"><option value="">All Plebe Companies</option></select>
<select id="affiliationFilter"><option value="">All Affiliations</option></select>
</div>
<div class="filter-row">
<div class="input-wrapper">
<svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
<input type="text" id="nameSearch" placeholder="Search by name..."/>
</div>
<div class="input-wrapper">
<svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
<input type="text" id="interestsSearch" placeholder="Search interests or location..."/>
</div>
</div>
<div class="filter-row">
<label style="display:flex;align-items:center;gap:.5rem;font-size:.875rem;color:#374151;cursor:pointer;">
<input type="checkbox" id="profilesOnly" style="width:auto;padding:0"> Show only profiles with full writeups
</label>
</div>
<div class="results-count" id="resultsCount">Loading...</div>
</div>
<div class="alumni-grid" id="alumniGrid"></div>
<div id="noResults" class="no-results"><p>No classmates found matching your criteria.</p></div>
</div>
</div>
<script src="data.js"></script>
<script>
function getUniq(key){return[...new Set(alumniData.map(a=>a[key]).filter(Boolean))].sort()}
function getUniqAff(){const all=alumniData.flatMap(a=>a.af?a.af.split(',').map(x=>x.trim()):[]).filter(Boolean);return[...new Set(all)].sort()}
const svgLoc='<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>';
const svgEm='<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>';
const svgPh='<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
function card(a){
  const loc=[a.tw,a.st].filter(Boolean).join(', ');
  let photos='';
  if(a.p1||a.p2){const gc=(a.p1&&a.p2)?'two-photos':'one-photo';photos='<div class="photo-grid '+gc+'">'+(a.p1?'<img src="'+a.p1+'" alt="">':'')+(a.p2?'<img src="'+a.p2+'" alt="">':'')+'</div>';}
  const locH=loc?'<div class="contact-item">'+svgLoc+'<span>'+loc+'</span></div>':'';
  const emH=a.em?'<div class="contact-item">'+svgEm+'<a href="mailto:'+a.em+'">'+a.em+'</a></div>':'';
  const phH=a.ph?'<div class="contact-item">'+svgPh+'<span>'+a.ph+'</span></div>':'';
  const wH=a.w?'<div class="writeup"><p>'+a.w.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p></div>':'';
  const acH=a.ac?'<div class="activities"><p><span class="label">Current Interests: </span>'+a.ac+'</p></div>':'';
  const afH=a.af?'<div class="affiliations"><div class="affiliations-tags">'+a.af.split(',').map(x=>'<span class="affiliation-tag">'+x.trim()+'</span>').join('')+'</div></div>':'';
  return'<div class="profile-card">'+photos+'<div class="profile-content"><div class="profile-header"><h2 class="profile-name">'+a.u+'</h2><p class="profile-full-name">'+a.n+'</p><div class="profile-companies"><span>Grad: '+a.g+'</span><span>Plebe: '+a.p+'</span></div></div><div class="contact-info">'+locH+emH+phH+'</div>'+wH+acH+afH+'</div></div>';
}
function filterAlumni(){
  const ns=document.getElementById('nameSearch').value.toLowerCase();
  const is=document.getElementById('interestsSearch').value.toLowerCase();
  const gc=document.getElementById('gradCoFilter').value;
  const pc=document.getElementById('plebeCoFilter').value;
  const af=document.getElementById('affiliationFilter').value;
  const po=document.getElementById('profilesOnly').checked;
  return alumniData.filter(a=>{
    const mn=!ns||a.u.toLowerCase().includes(ns)||a.n.toLowerCase().includes(ns);
    const mi=!is||(a.ac&&a.ac.toLowerCase().includes(is))||(a.tw&&a.tw.toLowerCase().includes(is))||(a.st&&a.st.toLowerCase().includes(is))||(a.w&&a.w.toLowerCase().includes(is));
    const mco=(!gc&&!pc&&!af)||(gc&&a.g===gc)||(pc&&a.p===pc)||(af&&a.af&&a.af.includes(af));
    const mp=!po||(a.w&&a.w.length>10);
    return mn&&mi&&mco&&mp;
  });
}
function render(){
  const f=filterAlumni();
  document.getElementById('noResults').classList.toggle('show',f.length===0);
  document.getElementById('alumniGrid').innerHTML=f.length?f.map(card).join(''):'';
  document.getElementById('resultsCount').textContent='Showing '+f.length+' of '+alumniData.length+' classmates';
}
function init(){
  getUniq('g').forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;document.getElementById('gradCoFilter').appendChild(o)});
  getUniq('p').forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;document.getElementById('plebeCoFilter').appendChild(o)});
  getUniqAff().forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;document.getElementById('affiliationFilter').appendChild(o)});
  render();
  ['nameSearch','interestsSearch'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  ['gradCoFilter','plebeCoFilter','affiliationFilter','profilesOnly'].forEach(id=>document.getElementById(id).addEventListener('change',render));
}
init();
</script>
</body>
</html>
